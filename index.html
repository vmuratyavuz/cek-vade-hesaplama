<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çek Vade Hesaplayıcı</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/polyfills.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Sol Panel - Giriş Formu -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    Çek Vade Hesaplama
                </h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Çek Tarihi</label>
                        <input type="date" id="checkDate" class="w-full p-2 border rounded" title="Çek Tarihi">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Çek Tutarı</label>
                        <input type="text" id="checkAmount" class="w-full p-2 border rounded" placeholder="0 TL">
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Çek Türü</label>
                        <div class="w-full p-2 border rounded bg-white">
                            <div class="flex justify-between items-center">
                                <span id="checkTypeLabel" class="text-sm font-medium text-gray-900">Kendi Çekimiz</span>
                                <label class="flex items-center cursor-pointer">
                                    <div class="relative">
                                        <label for="checkType" class="hidden">Çek Türü</label>
                                        <input type="checkbox" id="checkType" class="hidden" checked>
                                        <div class="w-10 h-6 bg-gray-300 rounded-full shadow-inner transition-colors duration-200" id="toggleBackground"></div>
                                        <div class="absolute w-4 h-4 bg-white rounded-full shadow top-1 right-1 transition-transform duration-200" id="toggleCircle"></div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">Hesaplama Tarihi</label>
                        <input type="date" id="calculationDate" class="w-full p-2 border rounded" title="Hesaplama Tarihi">
                    </div>
                    <button onclick="addCheck()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
                        Çek Ekle
                    </button>
                </div>
            </div>

            <!-- Sağ Panel - Çek Listesi -->
            <div class="bg-white p-6 rounded-lg shadow h-full">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Eklenen Çekler
                </h2>
                <div style="max-height: 396px; overflow-y: auto;">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead>
                            <tr>
                                <th class="px-2 py-2 text-left w-[10%]">No</th>
                                <th class="px-2 py-2 text-left w-[25%]">Vade</th>
                                <th class="px-2 py-2 text-left w-[25%]">Tutar</th>
                                <th class="px-2 py-2 text-left w-[20%]">Çek Türü</th>
                                <th class="px-2 py-2 text-left w-[20%]">İşlem</th>
                            </tr>
                        </thead>
                        <tbody id="checkList">
                            <!-- JavaScript ile doldurulacak -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Sonuçlar Bölümü -->
        <div id="resultsSection" class="mt-4 hidden">
            <h2 class="text-xl font-bold mb-4">Hesaplama Sonuçları</h2>
            <div id="resultsSummary">
                <!-- JavaScript ile doldurulacak -->
            </div>
            <div class="mt-4">
                <button id="pdfButton" onclick="downloadPDF()" class="bg-red-600 text-white p-2 rounded hover:bg-red-700 hidden">
                    PDF İndir111
                </button>
            </div>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
