name: Fetch TCMB Rates

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rates from TCMB
        run: |
          TODAY=$(date +%d-%m-%Y)
          echo "Tarih: $TODAY"
          
          RESPONSE=$(curl -v -s \
            -H "key: 4AWJbrL1Or" \
            -H "Accept: application/json" \
            "https://evds2.tcmb.gov.tr/service/evds/series=TP.DK.USD.A-TP.DK.EUR.A&startDate=${TODAY}&endDate=${TODAY}&type=json&key=4AWJbrL1Or" 2>&1)
          
          echo "Tam Response: $RESPONSE"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rates.json || true
          git diff --staged --quiet || git commit -m "Test: $(date +%d.%m.%Y)"
          git push || true
