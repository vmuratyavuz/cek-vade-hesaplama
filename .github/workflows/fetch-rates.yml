name: Fetch TCMB Rates

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rates from TCMB
        run: |
          RESPONSE=$(curl -s -L "https://www.tcmb.gov.tr/kurlar/today.xml")
          echo "Response length: ${#RESPONSE}"
          echo "First 500 chars: ${RESPONSE:0:500}"
          
          USD=$(echo "$RESPONSE" | python3 -c "
          import sys
          import xml.etree.ElementTree as ET
          content = sys.stdin.read()
          root = ET.fromstring(content)
          for currency in root.findall('Currency'):
              code = currency.get('CurrencyCode')
              if code == 'USD':
                  buying = currency.find('ForexBuying')
                  if buying is not None and buying.text:
                      print(buying.text.replace(',', '.'))
                      break
          " 2>/dev/null || echo "0")
          
          EUR=$(echo "$RESPONSE" | python3 -c "
          import sys
          import xml.etree.ElementTree as ET
          content = sys.stdin.read()
          root = ET.fromstring(content)
          for currency in root.findall('Currency'):
              code = currency.get('CurrencyCode')
              if code == 'EUR':
                  buying = currency.find('ForexBuying')
                  if buying is not None and buying.text:
                      print(buying.text.replace(',', '.'))
                      break
          " 2>/dev/null || echo "0")
          
          echo "USD: $USD, EUR: $EUR"
          
          cat > rates.json << EOF
          {
            "USD": $USD,
            "EUR": $EUR,
            "date": "$(date +%d.%m.%Y)"
          }
          EOF
          
          cat rates.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "Kurlar güncellendi: $(date +%d.%m.%Y)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
