name: Fetch TCMB Rates

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch rates from TCMB
        run: |
          RESPONSE=$(curl -s -L "https://www.tcmb.gov.tr/kurlar/today.xml")
          echo "Response length: ${#RESPONSE}"

          USD=$(echo "$RESPONSE" | python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.fromstring(sys.stdin.read())
          for c in root.findall('Currency'):
              if c.get('CurrencyCode') == 'USD':
                  b = c.find('ForexBuying')
                  if b is not None and b.text:
                      print(b.text.replace(',', '.'))
                      break
          " 2>/dev/null || echo "0")

          EUR=$(echo "$RESPONSE" | python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.fromstring(sys.stdin.read())
          for c in root.findall('Currency'):
              if c.get('CurrencyCode') == 'EUR':
                  b = c.find('ForexBuying')
                  if b is not None and b.text:
                      print(b.text.replace(',', '.'))
                      break
          " 2>/dev/null || echo "0")

          echo "USD: $USD, EUR: $EUR"

          python3 -c "
          import json
          data = {
              'USD': float('$USD'),
              'EUR': float('$EUR'),
              'date': '$(date +%d.%m.%Y)'
          }
          with open('rates.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False)
          print('Yazıldı:', data)
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add rates.json
          git diff --staged --quiet || git commit -m "Kurlar güncellendi: $(date +%d.%m.%Y)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
